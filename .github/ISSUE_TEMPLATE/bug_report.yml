name: Bug report
description: Something in the theme doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Clone the theme and run `npm install`
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: astro-version
    attributes:
      label: Astro version
      description: Output of `npx astro --version`
      placeholder: "7.0.3"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v22.12.0"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Blog
        - Portfolio
        - Landing page
        - Glass UI / styling
        - Light/dark theme
        - SEO / RSS / sitemap
        - Build / deploy
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, deploy target, screenshots, error output — anything that helps.
